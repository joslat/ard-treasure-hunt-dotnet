  <main class="award">
    <div class="medal" aria-hidden="true">
      <div class="medal-ring">🏆</div>

      Congrats, you solved the Agentic Resource Discovery (ARD) challenge!

    <label class="field">
      <span class="field-label">Your name</span>
      <input type="text" id="player-name" placeholder="Enter your name" autocomplete="name" />

      <span class="field-label">Completion code</span>
      <div class="code-row">

        <button type="button" id="copy-code" class="copy-btn" title="Copy code">Copy</button>
      </div>
    </label>

    <p class="footer-note" id="player-greeting"></p>
  </main>
</body>
